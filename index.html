<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页布局</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 10px;
            max-width: 480px;
            margin: 0 auto;
        }
        
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            padding: 15px 0;
        }
        
        .divider {
            border-top: 1px solid #000;
            margin-bottom: 20px;
        }
        
        .content-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 10px;
        }
        
        .content-box {
            border: 2px solid #000;
            padding: 10px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .content-box img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
        }
        
        .content-box p {
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="title">Share accounts</div>
    <div class="divider"></div>
    <div class="content-container">
        <div class="content-box">
            <img src="images/spotify.jpg" alt="Spotify" style="display: block; margin-bottom: 15px;">

        </div>
        <div class="content-box">
            <img src="images/iptv.jpg" alt="IPTV" style="display: block; margin-bottom: 15px;">
            <p style="font-size:18px">I have software accounts to share. If you're interested, feel free to reach me on WhatsApp at <a href="https://wa.me/8613617165785" target="_blank" style="color: inherit; text-decoration: none; cursor: pointer;">+8613617165785</a>or<a href="https://wa.me/85246344881" target="_blank" style="color: inherit; text-decoration: none; cursor: pointer;">+85246344881</a></p>
        </div>
    </div>
</body>
</html>
